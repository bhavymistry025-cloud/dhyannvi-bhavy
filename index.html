<!DOCTYPE html>
<html>
<head>
<title>For Dhyanvi 💖</title>
<style>
body{
margin:0;
font-family:Segoe UI;
text-align:center;
background:linear-gradient(to bottom,#ffd6e7,#ffc0cb);
overflow:hidden;
}

#main{
display:none;
padding:50px;
}

button{
padding:10px 20px;
font-size:18px;
border:none;
border-radius:20px;
background:#ff69b4;
color:white;
cursor:pointer;
margin:10px;
}

h1{
color:#d63384;
}

img{
width:250px;
border-radius:20px;
margin:10px;
box-shadow:0 0 20px pink;
}
</style>
</head>

<body>

<div id="start">
<h1>Are You Ready To See? 💕</h1>
<button onclick="showMain()">Yes</button>
<button onclick="onlyYes()">No</button>
</div>

<div id="main">
<h1>Dhyanvi 💖</h1>

<p>
You are the most beautiful soul I have ever seen.  
Your smile makes my day brighter and your presence makes everything special.  
You just complete me. I love you so much ❤️
</p>

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">

</div>

<script>
function showMain(){
document.getElementById("start").style.display="none";
document.getElementById("main").style.display="block";
}

function onlyYes(){
alert("You have to choose only YES 😌💖");
}
</script>

</body>
</html>
